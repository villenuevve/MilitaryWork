<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результат Класифікації</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Результат Класифікації</h1>

        <div class="result-card">
            <h2>Клас:</h2>
            <p class="predicted-class">{{ predicted_class }}</p>

            <h2>Впевненість:</h2>
            <div class="confidence-bar">
                <div class="confidence-progress" style="width: {{ confidence }}%;"></div>
            </div>
            <p>{{ confidence }}%</p>

            <a href="{{ url_for('main.index') }}">
                <button class="back-btn">← Повернутися на головну</button>
            </a>
        </div>
    </div>
</body>
</html>
